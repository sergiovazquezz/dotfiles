# Font
# font_family      family="JetBrainsMonoNL Nerd Font Mono"
# font_family      family="FiraCode Nerd Font Mono"
# font_family      family="VictorMono Nerd Font Mono" style="Medium"
disable_ligatures always
# font_family      family="BlexMono Nerd Font Mono"
font_family      family="IosevkaTerm Nerd Font Mono"
font_size        22
bold_font        auto
italic_font      auto
bold_italic_font auto

include ./catppuccin-mocha.conf

# Window appearance
hide_window_decorations titlebar-only
remember_window_size yes
sync_to_monitor yes

# Tabs
tab_bar_style powerline

# Sound
enable_audio_bell no

# Window 
draw_minimal_borders yes
window_padding_width 3 10 2

# Mouse
mouse_hide_wait 0.5

# Cursor
cursor_shape block
cursor_blink_interval 0

# Shell integration
shell_integration no-cursor no-title
copy_on_select clipboard

clear_all_shortcuts yes

# OS Window
map cmd+n       new_os_window
map ctrl+shift+n new_os_window

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard

# Tabs
map cmd+t new_tab
map cmd+w close_tab
map cmd+l next_tab
map cmd+h previous_tab
map cmd+shift+l move_tab_forward
map cmd+shift+h move_tab_backward
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+r set_tab_title

# Windows
map ctrl+t new_window
map ctrl+w close_window
