# Wait 10ms to check files under the current directory
scan_timeout = 10

"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Prompt with lang versions
# format = """$character$directory$git_branch$git_status$c$cpp$elixir$elm$golang$java$python$ruby$rust$nodejs$bun$docker_context$package$localip[Ô£ù](bold red) """

# Prompt with no lang versions
format = """$character$directory$git_branch$git_status[Ô£ù](bold #eed49f) """

# Make prompt single line
[line_break]
disabled = true

[character]
success_symbol = '[ÔŞ£](bold #a6da95)'
error_symbol = '[ÔŞ£](bold red)'

[package]
symbol = "¾░Åù "

[localip]
disabled = true
ssh_only = false
format = '¾░®ş [$localipv4](bold red) '

[sudo]
#style = "bold green"
#symbol = "­şÆ╗ "
#disabled = false

[username]
disabled = true
#style_user = "green bold"
#style_root = "red bold"
#format = "[$user]($style) "
#show_always = true

[hostname]
disabled = true
#ssh_only = false
#format = 'on [$hostname](bold yellow) '
#trim_at = "."

[directory]
read_only = " ¾░»ä"
truncation_length = 4
truncate_to_repo = true
style = "bold #8aadf4"

# Substitute directory names with icons
# [directory.substitutions]
# 'Documents' = '¾░êÖ'
# 'Downloads' = '´ÇÖ '
# 'Music' = '´Çü '
# 'Pictures' = '´Ç¥ '

[cmd_duration]
disabled = true
#min_time = 4
#show_milliseconds = false
#style = "bold italic red"

[git_status]
ahead = "Ôçí${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
behind = "Ôçú${count}"
style = "bold #f5bde6"
format = "[$all_status$ahead_behind]($style)[\\)](bold #c6a0f6) "

[aws]
symbol = "¯Ş¡ "

[conda]
symbol = "¯İò "

[dart]
symbol = "¯Öî "

[docker_context]
symbol = "¯Ş░ "
format = "  [$symbol$context]($style) "
style = "bold blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[c]
# symbol = "¯İŞ "
commands = [['gcc-15', '--version']]
format = "[gcc:\\(](bold #91d7e3)[$version](bold #f0c6c6)[\\)](bold #91d7e3) "

[cpp]
disabled = false
commands = [['g++-15', '--version']]
format = "[g++:\\(](bold #91d7e3)[$version](bold #f0c6c6)[\\)](bold #91d7e3) "
# detect_extensions = ["cpp", "cxx", "cc", "c++", "hpp", "hxx", "h++", "hh"]

[elixir]
# symbol = "¯İ¡ "
format = "[elixir:\\(](bold #91d7e3)[$version](bold #f0c6c6)[\\)](bold #91d7e3) "

[elm]
# symbol = "¯İ¼ "
format = "[elm:\\(](bold #91d7e3)[$version](bold #f0c6c6)[\\)](bold #91d7e3) "

[git_branch]
# symbol = " ¾░İ¼ "
style = "bold #f5bde6"
format = "[git:\\(](bold #c6a0f6)[$branch]($style)"

[golang]
# symbol = "¯İğ "
format = "[golang:\\(](bold #91d7e3)[$version](bold #f0c6c6)[\\)](bold #91d7e3) "

[hg_branch]
