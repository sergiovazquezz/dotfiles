# Wait 10ms to check files under the current directory
scan_timeout = 10

"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Make prompt single line
[line_break]
disabled = true

[character]
success_symbol = '[‚ěú](bold #fff)'
error_symbol = '[‚úó](bold red)'

[package]
symbol = "ůįŹó "

[localip]
disabled = true
ssh_only = false
format = 'ůį©ü [$localipv4](bold red) '

[sudo]
#style = "bold green"
#symbol = "ūüíĽ "
#disabled = false

[username]
disabled = true
#style_user = "green bold"
#style_root = "red bold"
#format = "[$user]($style) "
#show_always = true

[hostname]
disabled = true
#ssh_only = false
#format = 'on [$hostname](bold yellow) '
#trim_at = "."

[directory]
read_only = " ůįĮĄ"
truncation_length = 5
truncate_to_repo = true
style = "bold blue"

