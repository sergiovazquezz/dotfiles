"$schema" = 'https://starship.rs/config-schema.json'

# format = "$username$directory$git_branch$git_status$cmd_duration$status$character"

# Wait 10ms to check files under the current directory
scan_timeout = 10

add_newline = false

[line_break]
disabled = true

[character]
# success_symbol = '[Ô×£](bold green)'
# error_symbol = '[Ô×£](bold red)'
# success_symbol = '[ÔØ»](bold green)'
# error_symbol = '[ÔØ»](bold red)'
# success_symbol = '[ÔÇ║](bold green)'
# error_symbol = '[ÔÇ║](bold red)'
success_symbol = "[\\$](green)"
error_symbol = "[\\$](red)"

[package]
disabled = true
symbol = "¾░Åù "

[localip]
disabled = true
ssh_only = false
format = '¾░®ƒ [$localipv4](bold red) '

[username]
disabled = true
style_user = "yellow bold"
style_root = "red bold"
format = "[$user]($style)"
show_always = true

[hostname]
disabled = true
ssh_only = false
format = "[@$hostname](bold yellow) "
trim_at = "."

[directory]
read_only = " ¾░»ä"
truncation_length = 4
truncate_to_repo = true
style = "blue"

[cmd_duration]
disabled = true
min_time = 4
show_milliseconds = false
style = "bold italic red"


[aws]
symbol = "¯×¡ "

[conda]
symbol = "¯ÿò "

[dart]
symbol = "¯Öî "

[docker_context]
symbol = "¯×░ "
format = "[$symbol$context]($style) "
style = "bold blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
disabled = false

[c]
symbol = "¯ÿ×"
# commands = [['gcc-15', '--version']]
# format = "via [$symbol](bold yellow) [$version](yellow) "
format = "via [$symbol](bold yellow) "
detect_extensions = ['c']

[cpp]
disabled = false
symbol = "¯ÿØ"
# commands = [['g++-15', '--version']]
# format = "via [$symbol](yellow) [$version](yellow) "
format = "via [$symbol](yellow) "
detect_extensions = ['cpp', 'cc', 'cxx', 'c++', 'tcc']

[elixir]
symbol = "¯ÿ¡ "

[elm]
symbol = "¯ÿ¼ "

[git_branch]
symbol = "¾░ÿ¼ "
format = "on [$symbol](bold purple)[$branch(:$remote_branch)](purple) "

[git_metrics]
disabled = true

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'

[golang]
symbol = "¯ÿº"
format = "via [$symbol](bold yellow) [$version](yellow) "

[hg_branch]
symbol = "¾░ÿ¼ "

