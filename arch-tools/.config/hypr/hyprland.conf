# https://wiki.hypr.land/Configuring/

# https://wiki.hypr.land/Configuring/Monitors/
monitor=DP-1,3840x2160@144.05,auto,1.5

# https://wiki.hypr.land/Configuring/Keywords/
$terminal = kitty
$fileManager = dolphin
$browser = brave --password-store=kwallet6
$menu = fuzzel
$waybar = waybar -c ~/.config/waybar/hyprland.jsonc -s ~/.config/waybar/hyprland.css &
$reload_waybar = pkill waybar; $waybar
$reload_paper = pkill hyprpaper; hyprpaper

exec-once = /usr/lib/pam_kwallet_init
exec-once = systemctl --user start hyprpolkit
exec-once = nm-applet &
# exec-once = $waybar
# exec-once = hypridle &
# exec-once = swaync &
# exec-once = hyprpaper
exec-once = keyd-application-mapper -d
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
exec-once = qs -c noctalia-shell
exec-once = $terminal

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct

workspace = 1, monitor:DP-1, persistent:true
workspace = 2, monitor:DP-1, persistent:true
workspace = 3, monitor:DP-1, persistent:true
workspace = 4, monitor:DP-1, persistent:true
workspace = 5, monitor:DP-1, persistent:true

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 30

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types
    col.active_border = rgb(82aaff)
    col.inactive_border = rgba(595959aa)

    resize_on_border = false

    # https://wiki.hypr.land/Configuring/Tearing/
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 2
        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # https://wiki.hypr.land/Configuring/Animations/#curves
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # https://wiki.hypr.land/Configuring/Animations/
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = false
    force_split = 2
    use_active_for_splits = true
    default_split_ratio = 1.0
    precise_mouse_move = false
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more

master {
  orientation = left
  mfact = 0.50
  new_status = slave
  new_on_top = false
  new_on_active = after
}

# See https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_autoreload = false
}

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = es
    kb_rules =

    follow_mouse = 1
    accel_profile = flat
    force_no_accel = 1

    sensitivity = 0.9 # -1.0 - 1.0

    touchpad {
        natural_scroll = false
    }
}

# https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs

# https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER ALT CTRL

# See https://wiki.hypr.land/Configuring/Binds/
bind = $mainMod, t, exec, $terminal
bind = $mainMod, g, exec, $browser
bind = $mainMod, e, exec, $fileManager
bind = $mainMod, space, exec, $menu
bind = $mainMod, W, exec, $reload_waybar
bind = $mainMod, P, exec, $reload_paper
bind = $mainMod, q, killactive,
bind = $mainMod, R, togglefloating,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod, s, togglesplit,
# bind = $mainMod, N, exec, swaync-client -t -sw
# bind = $mainMod, M, exec, ~/.config/scripts/fuzzel-powermenu.sh
bind = , Print, exec, ~/.config/scripts/screenshot/region.sh
bind = SHIFT, Print, exec, ~/.config/scripts/screenshot/fullscreen.sh

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Resize vertically
bind = $mainMod, up,   resizeactive, 0 -100
bind = $mainMod, down, resizeactive, 0 100

# Resize horizontally
bind = $mainMod, left,  resizeactive, -100 0
bind = $mainMod, right, resizeactive,  100 0

bind = $mainMod, up,   splitratio, -0.15
bind = $mainMod, down, splitratio, +0.15

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}
